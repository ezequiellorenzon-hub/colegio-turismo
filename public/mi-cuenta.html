<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriculación - CPTBA</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        /* Ajustes específicos para esta página */
        .step-number {
            background: var(--primary) !important; /* Fondo sólido para que no se pierda */
            color: white !important;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .step-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <section class="section">
        <div class="container">
            <h1 class="section-title">Matriculación</h1>
            
            <div style="max-width: 1000px; margin: 0 auto;">
                
                <div class="card" style="margin-bottom: 40px;">
                    <div class="card-content">
                        <h2 style="color: var(--primary); margin-bottom: 20px;">MI CUENTA</h2>
                        <p style="margin-bottom: 15px;">Esta va a ser la pagina de matriculados</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        // Carga de Navbar
        fetch('/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
            });

        // Carga de Footer
        fetch('/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>
</body>
</html>
