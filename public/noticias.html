<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Últimas noticias y comunicados del Colegio de Profesionales en Turismo.">
    <meta property="og:title" content="Noticias - Colegio de Turismo">
    <meta property="og:description" content="Últimas noticias y comunicados del Colegio de Profesionales en Turismo.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://colegioturismo.org.ar/noticias.html">
    <meta property="og:image" content="/assets/images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <title>Noticias - Colegio de Turismo</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    
    <!--navbar-->
    <div id="navbar-placeholder"></div>

    <section class="section">
        <div class="container">
            <h1 class="section-title">Noticias y Comunicados</h1>
            <p class="section-subtitle">Mantente al día con las novedades del colegio</p>
            
            <div id="news-container" class="cards-grid">
                <div class="loading">Cargando noticias</div>
            </div>
        </div>
    </section>

    <!--/*FOOTER*/-->
    <div id="footer-placeholder"></div>

    <script>
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('active');
        }

        async function loadNews() {
            try {
                const response = await fetch('/api/news');
                const news = await response.json();
                
                const container = document.getElementById('news-container');
                
                if (news.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: var(--gray);">No hay noticias</p>';
                    return;
                }
                
                container.innerHTML = news.map(item => `
                    <a href="/noticia.html?id=${item.id}" class="card fade-in" style="text-decoration: none; color: inherit; display: block; transition: transform 0.3s;">
                        ${item.image_url ? `<img src="${item.image_url}" alt="${item.title}" class="card-image">` : '<div class="card-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>'}
                        <div class="card-content">
                            <h3 class="card-title">${item.title}</h3>
                            <p class="card-text">${item.excerpt || item.content.substring(0, 200)}...</p>
                            <div class="card-meta">
                                <span>👤 ${item.author}</span>
                                <span>📅 ${new Date(item.created_at).toLocaleDateString('es-ES')}</span>
                            </div>
                            <button class="btn btn-primary" style="margin-top: 15px;">Leer más →</button>
                        </div>
                    </a>
                `).join('');
                
            } catch (error) {
                console.error('Error:', error);
            }
        }

        loadNews();

        // NAVBAR
        fetch('/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
            })
            .catch(err => console.error('Error cargando navbar:', err));

        // FOOTER
        fetch('/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(err => console.error('Error cargando footer:', err));
    </script>
</body>
</html>
